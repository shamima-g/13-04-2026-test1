# Generated by design-api-agent
openapi: "3.0.3"
info:
  title: Team Task Management API
  version: "1.0.0"
  description: |
    REST API for the Team Task Management application. Supports two roles:
    team-member (view and complete their own assigned tasks) and admin
    (full CRUD on tasks, view all tasks across all users).
    All endpoints require authentication.

servers:
  - url: http://localhost:3001/api
    description: Local development server

security:
  - bearerAuth: []

paths:
  /auth/me:
    get:
      operationId: getCurrentUser
      summary: Get the currently authenticated user
      description: Returns the session user's id, displayName, email, and role. Used by the frontend to determine post-sign-in redirect and role-based UI.
      x-requirements: [R1, R2, BR10]
      x-source: agent-inferred
      x-provenance-note: "Best-guess design from FRS — no user-provided spec"
      tags: [Auth]
      responses:
        "200":
          description: Authenticated user details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tasks:
    get:
      operationId: listTasks
      summary: List tasks (role-scoped)
      description: |
        Returns tasks visible to the authenticated user.
        - team-member: only tasks assigned to them
        - admin: all tasks regardless of assignment
        Supports optional status filtering.
      x-requirements: [R1, R2, R3, R4, R5, R14]
      x-source: agent-inferred
      x-provenance-note: "Best-guess design from FRS — no user-provided spec"
      tags: [Tasks]
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by task status. Omit to return all.
          schema:
            type: string
            enum: [pending, complete]
        - name: limit
          in: query
          required: false
          description: Maximum number of tasks to return (default 100).
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          required: false
          description: Number of tasks to skip for pagination.
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: List of tasks visible to the authenticated user
          content:
            application/json:
              schema:
                type: object
                required: [tasks, total]
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"
                  total:
                    type: integer
                    description: Total count of matching tasks (for pagination)
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createTask
      summary: Create a new task (admin only)
      description: Creates a new task. Only admins may call this endpoint. The assigned user is locked at creation time and cannot be changed later.
      x-requirements: [R7, R8, BR1, BR2, BR3, BR4, BR5, BR7]
      x-source: agent-inferred
      x-provenance-note: "Best-guess design from FRS — no user-provided spec"
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Validation error (missing required fields, title too long, invalid assignee, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — team-member role cannot create tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tasks/{taskId}:
    get:
      operationId: getTask
      summary: Get task detail
      description: Returns full detail for a single task. team-member may only fetch tasks assigned to them; admin may fetch any task.
      x-requirements: [R6, BR6, BR9]
      x-source: agent-inferred
      x-provenance-note: "Best-guess design from FRS — no user-provided spec"
      tags: [Tasks]
      parameters:
        - $ref: "#/components/parameters/taskId"
      responses:
        "200":
          description: Task detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — team-member requesting a task not assigned to them
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateTask
      summary: Edit a task (admin only)
      description: |
        Updates editable fields of an existing task: title, description, and dueDate.
        The assignedUserId field cannot be changed after creation (BR5).
        Only admins may edit tasks.
      x-requirements: [R9, BR1, BR2, BR3, BR5, BR7]
      x-source: agent-inferred
      x-provenance-note: "Best-guess design from FRS — no user-provided spec"
      tags: [Tasks]
      parameters:
        - $ref: "#/components/parameters/taskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — team-member role cannot edit tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteTask
      summary: Delete a task (admin only)
      description: Permanently deletes a task. Only admins may delete tasks. Deletion is irreversible.
      x-requirements: [R10, BR7]
      x-source: agent-inferred
      x-provenance-note: "Best-guess design from FRS — no user-provided spec"
      tags: [Tasks]
      parameters:
        - $ref: "#/components/parameters/taskId"
      responses:
        "204":
          description: Task deleted successfully (no body)
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — team-member role cannot delete tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tasks/{taskId}/complete:
    post:
      operationId: completeTask
      summary: Mark a task as complete (team-member only, own tasks)
      description: |
        Marks a pending task as complete. Only the team-member to whom the task is
        assigned may call this endpoint (BR6). Admins cannot mark tasks complete (BR7).
        Completion is final — there is no endpoint to revert to pending (BR8).
      x-requirements: [R11, R12, R13, BR6, BR7, BR8]
      x-source: agent-inferred
      x-provenance-note: "Best-guess design from FRS — no user-provided spec"
      tags: [Tasks]
      parameters:
        - $ref: "#/components/parameters/taskId"
      responses:
        "200":
          description: Task updated to complete status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — either admin role (BR7), or team-member attempting to complete a task not assigned to them (BR6)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict — task is already complete (BR8)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      summary: List all users (admin only)
      description: Returns all user records for use in the task assignment dropdown. Only admins may list users (to populate the assigned-user selector when creating a task).
      x-requirements: [R7, BR4]
      x-source: agent-inferred
      x-provenance-note: "Best-guess design from FRS — no user-provided spec"
      tags: [Users]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 200
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: List of all users
          content:
            application/json:
              schema:
                type: object
                required: [users, total]
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  total:
                    type: integer
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — team-member role cannot list users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: NextAuth session token (JWT). All routes require authentication (BR10).

  parameters:
    taskId:
      name: taskId
      in: path
      required: true
      description: Unique identifier of the task
      schema:
        type: string

  schemas:
    User:
      type: object
      required: [id, displayName, email, role]
      properties:
        id:
          type: string
          description: Unique user identifier
        displayName:
          type: string
          description: The user's display name shown in task assignments
        email:
          type: string
          format: email
          description: The user's email address
        role:
          type: string
          enum: [team-member, admin]
          description: The user's role — determines access rights throughout the app

    Task:
      type: object
      required: [id, title, dueDate, assignedUserId, assignedUser, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          description: Unique task identifier
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Task title (required, 1–200 chars, BR1)
        description:
          type: string
          nullable: true
          description: Optional task description (no character limit in v1, BR2)
        dueDate:
          type: string
          format: date
          description: Due date for the task in ISO 8601 date format (required, BR3)
        assignedUserId:
          type: string
          description: ID of the user the task is assigned to (locked at creation, BR5)
        assignedUser:
          $ref: "#/components/schemas/User"
          description: Embedded user object for display (avoids a second request when rendering task detail, R6)
        status:
          type: string
          enum: [pending, complete]
          description: Current task status. Completion is final — no revert to pending (BR8)
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the task was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the task was last updated

    CreateTaskRequest:
      type: object
      required: [title, dueDate, assignedUserId]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Task title (required, 1–200 chars, BR1)
        description:
          type: string
          nullable: true
          description: Optional task description (BR2)
        dueDate:
          type: string
          format: date
          description: Due date in ISO 8601 date format (required, BR3)
        assignedUserId:
          type: string
          description: ID of the user to assign the task to — must reference an existing user (BR4)

    UpdateTaskRequest:
      type: object
      description: All fields are optional; include only those to update. assignedUserId is intentionally excluded (BR5).
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Updated task title (1–200 chars, BR1)
        description:
          type: string
          nullable: true
          description: Updated task description (BR2)
        dueDate:
          type: string
          format: date
          description: Updated due date in ISO 8601 date format (BR3)

    ErrorResponse:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
          description: Human-readable error message
        code:
          type: string
          description: Machine-readable error code (e.g., UNAUTHORIZED, FORBIDDEN, NOT_FOUND, VALIDATION_ERROR)
        details:
          type: array
          items:
            type: string
          description: Additional error details (e.g., field-level validation messages)

tags:
  - name: Auth
    description: Authentication and current-user endpoints
  - name: Tasks
    description: Task CRUD, listing, and status transitions
  - name: Users
    description: User listing (for task assignment)
